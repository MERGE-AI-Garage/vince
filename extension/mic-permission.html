<!DOCTYPE html>
<html lang="en">
<head>

  <title>Microphone Access — Vince</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      font-family: Epilogue, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #133B34;
      color: #EAE8E3;
    }
    h2 { color: #1ED75F; font-size: 18px; margin-bottom: 8px; }
    p { color: rgba(234, 232, 227, 0.6); max-width: 360px; text-align: center; line-height: 1.5; font-size: 13px; }
    #btn-grant {
      background: #1ED75F; color: #133B34; border: none;

<body>
  <h2>MERGE AI — Microphone Access</h2>

  <script src="grant-permission.js"></script>
